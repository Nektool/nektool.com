<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nektool — Mission Control</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0e14;color:#e2e8f0;font-family:Consolas,'Courier New',monospace;font-size:13px;overflow-x:hidden;min-height:100vh}

/* === MISSION CONTROL BAR === */
#mc-bar{
  display:flex;align-items:center;gap:16px;padding:10px 18px;
  background:#0d1117;border-bottom:1px solid #1e293b;
  position:sticky;top:0;z-index:50;
}
#mc-label{font-size:12px;font-weight:700;color:#22c55e;letter-spacing:.12em;white-space:nowrap}
#mc-progress-wrap{flex:1;display:flex;align-items:center;gap:10px}
.mc-seg{height:12px;flex:1;border-radius:2px;background:#1e293b;overflow:hidden;position:relative}
.mc-seg-fill{height:100%;border-radius:2px;transition:width .8s ease}
.seg-green .mc-seg-fill{background:linear-gradient(90deg,#16a34a,#22c55e)}
.seg-amber .mc-seg-fill{background:linear-gradient(90deg,#d97706,#f59e0b)}
.seg-red .mc-seg-fill{background:linear-gradient(90deg,#991b1b,#ef4444)}
#mc-right{display:flex;align-items:center;gap:14px;white-space:nowrap}
#mc-team{font-size:11px;color:#64748b;letter-spacing:.08em}
#mc-status{font-size:11px;font-weight:700}
.mc-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;animation:pulse-dot 2s ease-in-out infinite}
#mc-clock{font-size:11px;color:#4ade80;letter-spacing:.06em}

/* === CANVAS WRAPPER === */
#canvas-wrap{
  position:relative;width:100%;max-width:1000px;margin:0 auto;
  background:#0a0e14;
}
#office-canvas{display:block;width:100%;height:auto;image-rendering:pixelated;image-rendering:crisp-edges}

/* === MARQUEE === */
#marquee-bar{
  background:rgba(0,0,0,.75);border-top:1px solid rgba(74,222,128,.15);
  padding:6px 0;overflow:hidden;
}
#marquee-track{display:flex;white-space:nowrap;animation:marquee 50s linear infinite}
#marquee-track .mitem{color:#4ade80;font-size:11px;padding:0 28px;letter-spacing:.04em}
#marquee-track .mitem::before{content:'/// ';color:#6366f1;opacity:.7}

/* === LIVE FEED === */
#live-feed{
  max-width:1000px;margin:0 auto;padding:16px 18px;
  background:#0a0e14;border-top:1px solid #1e293b;
}
#feed-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
#feed-title{font-size:12px;font-weight:700;color:#4ade80;letter-spacing:.12em}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse-dot 1.5s ease-in-out infinite}
#feed-count{margin-left:auto;font-size:10px;color:#64748b}
#feed-list{display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto}
#feed-list::-webkit-scrollbar{width:4px}
#feed-list::-webkit-scrollbar-track{background:#0d1117}
#feed-list::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.feed-item{display:flex;align-items:baseline;gap:8px;padding:5px 8px;border-radius:4px;font-size:11px;background:rgba(15,23,42,.6);border:1px solid #111827}
.feed-time{color:#334155;flex-shrink:0;font-size:10px;width:52px}
.feed-type{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;letter-spacing:.06em;width:52px;text-align:center}
.feed-agent{color:#6366f1;font-weight:700;flex-shrink:0;width:74px}
.feed-text{color:#94a3b8;flex:1}
.type-DEPLOY{background:rgba(99,102,241,.2);color:#818cf8}
.type-COMMIT{background:rgba(34,197,94,.15);color:#4ade80}
.type-EDIT{background:rgba(6,182,212,.15);color:#22d3ee}
.type-WRITE{background:rgba(249,115,22,.15);color:#fb923c}
.type-AUDIT{background:rgba(245,158,11,.15);color:#fbbf24}
.type-RESEARCH{background:rgba(168,85,247,.15);color:#c084fc}
.type-PLAN{background:rgba(236,72,153,.15);color:#f472b6}
.type-START{background:rgba(34,197,94,.2);color:#4ade80}
.type-READ{background:rgba(100,116,139,.15);color:#94a3b8}

/* === AGENT PANELS === */
#panels-section{
  max-width:1000px;margin:0 auto;padding:16px 18px 24px;
}
#panels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.agent-panel{
  background:#111827;border:1px solid #1e293b;border-radius:8px;overflow:hidden;
  display:flex;flex-direction:column;min-height:220px;
}
.panel-header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #1e293b}
.panel-avatar{
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;flex-shrink:0;color:#fff;
}
.panel-info{flex:1;min-width:0}
.panel-name{font-size:12px;font-weight:700;line-height:1.2}
.panel-sub{font-size:10px;color:#64748b;margin-top:2px}
.panel-status-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.06em;flex-shrink:0}
.panel-prog-bar{height:3px;width:100%}
.panel-prog-fill{height:100%;border-radius:0}
.panel-events{flex:1;padding:10px 14px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:140px}
.panel-events::-webkit-scrollbar{width:3px}
.panel-events::-webkit-scrollbar-thumb{background:#1e293b}
.panel-event{display:flex;gap:6px;font-size:10px}
.pe-time{color:#334155;flex-shrink:0;width:42px}
.pe-text{color:#94a3b8}

/* === ANIMATIONS === */
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* === RESPONSIVE === */
@media(max-width:700px){
  #panels-grid{grid-template-columns:1fr}
  #mc-team{display:none}
}
@media(max-width:500px){
  .feed-agent{width:54px}
  .feed-type{width:42px}
}
</style>
</head>
<body>

<!-- MISSION CONTROL BAR -->
<div id="mc-bar">
  <div id="mc-label">// MISSION CONTROL</div>
  <div id="mc-progress-wrap">
    <div class="mc-seg seg-green"><div class="mc-seg-fill" id="seg1" style="width:0%"></div></div>
    <div class="mc-seg seg-green"><div class="mc-seg-fill" id="seg2" style="width:0%"></div></div>
    <div class="mc-seg seg-green"><div class="mc-seg-fill" id="seg3" style="width:0%"></div></div>
    <div class="mc-seg seg-amber"><div class="mc-seg-fill" id="seg4" style="width:0%"></div></div>
    <div class="mc-seg seg-amber"><div class="mc-seg-fill" id="seg5" style="width:0%"></div></div>
    <div class="mc-seg seg-red"><div class="mc-seg-fill" id="seg6" style="width:0%"></div></div>
  </div>
  <div id="mc-right">
    <div id="mc-team">NEKTOOL DEV TEAM</div>
    <div id="mc-status"><span class="mc-dot" style="background:#22c55e"></span><span style="color:#4ade80">BUILD ACTIVE</span></div>
    <div id="mc-clock">--:--:--</div>
  </div>
</div>

<!-- PIXEL ART CANVAS -->
<div id="canvas-wrap">
  <canvas id="office-canvas" width="1000" height="420"></canvas>
</div>

<!-- MARQUEE -->
<div id="marquee-bar">
  <div id="marquee-track"></div>
</div>

<!-- LIVE FEED -->
<div id="live-feed">
  <div id="feed-header">
    <div class="live-dot"></div>
    <div id="feed-title">LIVE FEED</div>
    <div id="feed-count">0 events</div>
  </div>
  <div id="feed-list"></div>
</div>

<!-- AGENT PANELS -->
<div id="panels-section">
  <div id="panels-grid"></div>
</div>

<script>
/* ============================================================
   STATE
============================================================ */
const STATE = {
  agents: {
    ares:        {name:'Ares',       role:'Coordinator',  status:'working', color:'#6366f1', lastAction:'Coordinando sesion 19',   icon:'A'},
    ceo:         {name:'CEO',        role:'Operations',   status:'idle',    color:'#8b5cf6', lastAction:'Asignaciones listas',      icon:'C'},
    developer:   {name:'Developer',  role:'Full-Stack',   status:'working', color:'#22c55e', lastAction:'Oficina virtual',          icon:'D'},
    tester:      {name:'Tester',     role:'QA',           status:'done',    color:'#f59e0b', lastAction:'Stripe audit 4.3/5',       icon:'T'},
    critic:      {name:'Critic',     role:'Product',      status:'idle',    color:'#ef4444', lastAction:'Pendiente evaluar',        icon:'P'},
    ventas:      {name:'Ventas',     role:'Sales',        status:'working', color:'#06b6d4', lastAction:'Posts FB listos',          icon:'V'},
    emprendedor: {name:'Research',   role:'Ideas',        status:'done',    color:'#f97316', lastAction:'10 grupos FB',             icon:'R'},
    pm:          {name:'PM',         role:'Projects',     status:'idle',    color:'#ec4899', lastAction:'Esperando dev-done',       icon:'M'},
    finanzas:    {name:'Finance',    role:'Fiscal',       status:'idle',    color:'#14b8a6', lastAction:'Sin alertas',              icon:'F'},
    legal:       {name:'Legal',      role:'Compliance',   status:'idle',    color:'#64748b', lastAction:'Sin pendientes',           icon:'L'}
  },
  events: [
    {time:'4:15 PM',type:'DEPLOY',  agent:'Ares',      text:'Office virtual deployada a nektool.com/office.html'},
    {time:'4:10 PM',type:'COMMIT',  agent:'Ares',      text:'feat: add virtual office page'},
    {time:'3:55 PM',type:'EDIT',    agent:'Developer', text:'office/index.html — 900 lines rebuilt'},
    {time:'3:45 PM',type:'WRITE',   agent:'Ares',      text:'scripts/install-autostart.sh — auto-boot config'},
    {time:'3:40 PM',type:'WRITE',   agent:'Ares',      text:'.claude/sessions/ventas.md — session config'},
    {time:'3:38 PM',type:'WRITE',   agent:'Ares',      text:'.claude/sessions/developer.md — session config'},
    {time:'3:35 PM',type:'EDIT',    agent:'Ares',      text:'settings.local.json — 3 hooks configured'},
    {time:'3:30 PM',type:'WRITE',   agent:'Ventas',    text:'listados-directorios-margenkit.md'},
    {time:'3:25 PM',type:'DEPLOY',  agent:'Ares',      text:'MargenKit demo /demo deployada'},
    {time:'3:20 PM',type:'WRITE',   agent:'Developer', text:'margenkit/src/app/demo/page.tsx — 379 lines'},
    {time:'3:15 PM',type:'AUDIT',   agent:'Tester',    text:'Stripe LeadFlow PASS — 4.3/5'},
    {time:'3:10 PM',type:'WRITE',   agent:'Ventas',    text:'posts-fb-margenkit-sesion19.md — 3 posts'},
    {time:'3:05 PM',type:'WRITE',   agent:'Developer', text:'post-fb-3-envio.svg'},
    {time:'3:00 PM',type:'RESEARCH',agent:'Research',  text:'10 grupos FB vendedores ML MX mapeados'},
    {time:'2:55 PM',type:'DEPLOY',  agent:'Ares',      text:'LeadFlow fix copy automatic reminders'},
    {time:'2:50 PM',type:'EDIT',    agent:'Developer', text:'leadflow 5 files — remove false promises'},
    {time:'2:45 PM',type:'PLAN',    agent:'CEO',       text:'Asignaciones sesion 19 — 7 tareas'},
    {time:'2:40 PM',type:'START',   agent:'Ares',      text:'Sesion 19 iniciada'}
  ],
  metrics:{commits:5, deploys:3, mrr:0, clients:0, deadline:29, products:2}
};

const PANEL_AGENTS = ['ares','developer','tester'];

/* ============================================================
   CANVAS — PIXEL ART OFFICE
============================================================ */
const canvas = document.getElementById('office-canvas');
const ctx = canvas.getContext('2d');
const CW = 1000, CH = 420;

// Block size: each pixel art "pixel" = 4 real pixels
const B = 4;

// Tick counter for animations
let tick = 0;

// Agent key order per desk (left to right, back row then front row)
const DESK_AGENTS = ['legal','finanzas','pm','ceo','ares','emprendedor','ventas','developer','tester','critic'];

// Desk layout: 5 back (y~140), 5 front (y~260)
// x positions: evenly spaced across 1000px
function getDeskPositions(){
  const positions = [];
  const backY  = 130;
  const frontY = 255;
  const cols   = 5;
  const margin = 60;
  const step   = (CW - margin*2) / (cols - 1);
  for(let i=0;i<cols;i++) positions.push({x: margin + i*step, y: backY,  row:0});
  for(let i=0;i<cols;i++) positions.push({x: margin + i*step, y: frontY, row:1});
  return positions;
}

// Color helpers
function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function drawRect(x,y,w,h,color){
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x*B), Math.round(y*B), Math.round(w*B), Math.round(h*B));
}

// Draw pixel-art person at grid coords (gx, gy) = top-left of person
function drawPerson(gx, gy, bodyColor, isWorking){
  // Shadow under chair
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(Math.round((gx-1)*B), Math.round((gy+7)*B), Math.round(8*B), Math.round(2*B));

  // Chair legs
  drawRect(gx,   gy+8, 1, 2, '#555');
  drawRect(gx+3, gy+8, 1, 2, '#555');

  // Chair seat
  drawRect(gx-1, gy+6, 6, 2, '#666');

  // Chair back
  drawRect(gx,   gy+3, 4, 3, '#555');

  // Body
  drawRect(gx, gy+3, 4, 4, bodyColor);

  // Head
  const headColor = '#f5c8a0';
  drawRect(gx+1, gy, 2, 2, headColor);

  // Eyes (tiny)
  if(isWorking){
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(Math.round((gx+1.3)*B), Math.round((gy+0.5)*B), Math.round(0.5*B), Math.round(0.5*B));
    ctx.fillRect(Math.round((gx+2.2)*B), Math.round((gy+0.5)*B), Math.round(0.5*B), Math.round(0.5*B));
  }

  // Arms (working = raised toward monitor)
  if(isWorking){
    drawRect(gx-1, gy+3, 1, 2, headColor);
    drawRect(gx+4, gy+3, 1, 2, headColor);
  } else {
    drawRect(gx-1, gy+4, 1, 3, headColor);
    drawRect(gx+4, gy+4, 1, 3, headColor);
  }

  // Hair
  ctx.fillStyle = '#3d2314';
  ctx.fillRect(Math.round((gx+1)*B), Math.round(gy*B), Math.round(2*B), Math.round(0.5*B));
}

function drawDesk(gx, gy, agentColor, screenGlow, label, isWorking){
  const deskW = 18, deskH = 3;
  const legH  = 4;
  const monW  = 8, monH = 5;

  // Desk shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(Math.round((gx-1)*B), Math.round((gy+deskH+legH)*B), Math.round((deskW+2)*B), Math.round(B));

  // Desk legs
  drawRect(gx+1,        gy+deskH, 1, legH, '#5a4010');
  drawRect(gx+deskW-2,  gy+deskH, 1, legH, '#5a4010');

  // Desk surface
  const dg = ctx.createLinearGradient(0, gy*B, 0, (gy+deskH)*B);
  dg.addColorStop(0, '#a07828');
  dg.addColorStop(1, '#6b4e10');
  ctx.fillStyle = dg;
  ctx.fillRect(Math.round(gx*B), Math.round(gy*B), Math.round(deskW*B), Math.round(deskH*B));

  // Monitor stand
  const msx = gx + (deskW - monW) / 2;
  drawRect(msx + monW/2 - 0.5, gy - 2, 1, 2, '#444');
  drawRect(msx + monW/2 - 1.5, gy - 2.5, 3, 0.5, '#555');

  // Monitor body
  drawRect(msx-0.5, gy - monH - 2.5, monW+1, monH+0.5, '#222');

  // Screen glow halo
  const rgb = hexToRgb(agentColor);
  const glowAlpha = isWorking ? 0.18 + 0.08*Math.sin(tick*0.05) : 0.06;
  ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${glowAlpha})`;
  ctx.fillRect(Math.round((msx-2)*B), Math.round((gy-monH-5)*B), Math.round((monW+5)*B), Math.round((monH+4)*B));

  // Screen
  const brightness = isWorking
    ? 0.7 + 0.3*Math.sin(tick*0.04 + Math.random()*0.1)
    : 0.25 + 0.05*Math.sin(tick*0.02);
  ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${brightness})`;
  ctx.fillRect(Math.round(msx*B), Math.round((gy-monH-2)*B), Math.round(monW*B), Math.round(monH*B));

  // Screen scanlines (subtle)
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  for(let i=0;i<monH;i+=2){
    ctx.fillRect(Math.round(msx*B), Math.round((gy-monH-2+i)*B), Math.round(monW*B), Math.round(B));
  }

  // Keyboard on desk
  drawRect(gx+1, gy+0.5, 4, 1, '#333');

  // Mouse
  drawRect(gx+5.5, gy+0.5, 1.5, 1, '#2a2a2a');

  // Label initial (tiny pixel font sim)
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = `bold ${2.5*B}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(label, Math.round((msx + monW/2)*B), Math.round((gy-monH)*B));
}

function drawScene(){
  ctx.clearRect(0, 0, CW, CH);

  // === CEILING ===
  const ceilGrad = ctx.createLinearGradient(0,0,0,30*B);
  ceilGrad.addColorStop(0, '#0d1117');
  ceilGrad.addColorStop(1, '#111827');
  ctx.fillStyle = ceilGrad;
  ctx.fillRect(0,0,CW,30*B);

  // Ceiling light panels
  const panelPositions = [100, 300, 500, 700, 900];
  panelPositions.forEach(px => {
    const glow = 0.7 + 0.15*Math.sin(tick*0.015);
    ctx.fillStyle = `rgba(200,220,255,${glow*0.12})`;
    ctx.fillRect(px-40, 0, 80, 10*B);
    ctx.fillStyle = `rgba(180,200,255,${glow*0.35})`;
    ctx.fillRect(px-36, 2*B, 72, 4*B);
    // Downward light cone
    const coneGrad = ctx.createLinearGradient(px, 6*B, px, 60*B);
    coneGrad.addColorStop(0, `rgba(180,210,255,${glow*0.06})`);
    coneGrad.addColorStop(1, 'rgba(180,210,255,0)');
    ctx.fillStyle = coneGrad;
    ctx.beginPath();
    ctx.moveTo(px-36, 6*B);
    ctx.lineTo(px+36, 6*B);
    ctx.lineTo(px+90, 60*B);
    ctx.lineTo(px-90, 60*B);
    ctx.closePath();
    ctx.fill();
  });

  // === BACK WALL ===
  const wallGrad = ctx.createLinearGradient(0, 30*B, 0, 80*B);
  wallGrad.addColorStop(0, '#1a1e2e');
  wallGrad.addColorStop(1, '#141824');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 30*B, CW, 60*B);

  // Wall texture — subtle vertical lines
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for(let x=0;x<CW;x+=20){
    ctx.beginPath();
    ctx.moveTo(x, 30*B);
    ctx.lineTo(x, 90*B);
    ctx.stroke();
  }

  // === NEKTOOL sign on wall ===
  ctx.fillStyle = 'rgba(99,102,241,0.12)';
  ctx.fillRect(390, 35*B, 220, 22*B);
  ctx.strokeStyle = 'rgba(99,102,241,0.35)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(390, 35*B, 220, 22*B);
  ctx.fillStyle = '#6366f1';
  ctx.font = `bold ${6*B}px monospace`;
  ctx.textAlign = 'center';
  const glowSign = 0.8 + 0.2*Math.sin(tick*0.03);
  ctx.shadowColor = '#6366f1';
  ctx.shadowBlur = 12*glowSign;
  ctx.fillText('NEKTOOL', CW/2, 49*B);
  ctx.shadowBlur = 0;

  // Digital clock on wall
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(820, 37*B, 130, 16*B);
  ctx.strokeStyle = 'rgba(74,222,128,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(820, 37*B, 130, 16*B);
  ctx.fillStyle = '#4ade80';
  ctx.shadowColor = '#22c55e';
  ctx.shadowBlur = 8;
  ctx.font = `bold ${4.5*B}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`${hh}:${mm}:${ss}`, 885, 47*B);
  ctx.shadowBlur = 0;

  // === BOOKSHELF (left wall) ===
  drawRect(0, 32, 18, 35, '#2a1f10');
  drawRect(1, 33, 16, 1, '#3d2b14');
  const bookColors = ['#ef4444','#f59e0b','#22c55e','#6366f1','#ec4899','#06b6d4','#8b5cf6','#f97316'];
  for(let i=0;i<8;i++){
    drawRect(1.5+i*2, 34, 1.5, 7, bookColors[i]);
    drawRect(1.5+i*2, 34, 0.3, 7, 'rgba(0,0,0,0.3)');
  }
  drawRect(1, 41, 16, 0.5, '#3d2b14');
  for(let i=0;i<6;i++){
    drawRect(2+i*2.5, 42, 2, 5, bookColors[(i+3)%8]);
  }
  drawRect(1, 47, 16, 0.5, '#3d2b14');

  // === GLOBE (right, upper) ===
  const globeX = 880, globeY = 55*B;
  const globeR = 22;
  const globeGlow = 0.5 + 0.2*Math.sin(tick*0.025);
  ctx.shadowColor = '#06b6d4';
  ctx.shadowBlur = 16*globeGlow;
  ctx.beginPath();
  ctx.arc(globeX, globeY, globeR, 0, Math.PI*2);
  const globeGrad = ctx.createRadialGradient(globeX-6, globeY-6, 2, globeX, globeY, globeR);
  globeGrad.addColorStop(0, '#0ea5e9');
  globeGrad.addColorStop(0.6, '#0369a1');
  globeGrad.addColorStop(1, '#1e3a5f');
  ctx.fillStyle = globeGrad;
  ctx.fill();
  // Continent hints
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(globeX, globeY, globeR, globeR*0.3, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(globeX, globeY, globeR*0.6, globeR, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Stand
  drawRect(Math.round(globeX/B)-1, Math.round(globeY/B)+6, 2, 3, '#666');
  drawRect(Math.round(globeX/B)-2, Math.round(globeY/B)+9, 4, 1, '#555');

  // === WHITEBOARD (center-left wall) ===
  drawRect(52, 33, 36, 22, '#f8f9fa');
  drawRect(52, 33, 36, 1.5, '#888');
  drawRect(52, 54, 36, 1.5, '#888');
  drawRect(52, 33, 1.5, 22, '#888');
  drawRect(86.5, 33, 1.5, 22, '#888');
  // Whiteboard content
  ctx.fillStyle = '#1a3a1a';
  ctx.font = `bold ${2.5*B}px monospace`;
  ctx.textAlign = 'left';
  ctx.fillText('IDEAS', 54*B, 38*B);
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(54*B, 41*B); ctx.lineTo(84*B, 41*B); ctx.stroke();
  ctx.fillStyle = '#333';
  ctx.font = `${2*B}px monospace`;
  ['LeadFlow', 'MargenKit', 'Next →'].forEach((t,i)=>{
    ctx.fillText(t, 54*B, (43+i*4)*B);
  });

  // === PLANT (bottom-left corner) ===
  const plantX = 12, plantY = 86;
  // Pot
  drawRect(plantX, plantY, 8, 5, '#8B4513');
  drawRect(plantX-1, plantY-0.5, 10, 1, '#a0522d');
  // Soil
  drawRect(plantX+1, plantY+0.5, 6, 1.5, '#5c3317');
  // Leaves
  ctx.fillStyle = '#16a34a';
  ctx.shadowColor = '#22c55e';
  ctx.shadowBlur = 6;
  [[plantX+4,plantY-5,10,6],[plantX+3,plantY-8,8,5],[plantX+5,plantY-6,9,4],
   [plantX+2,plantY-3,6,4],[plantX+6,plantY-7,7,5]].forEach(([x,y,rx,ry])=>{
    ctx.beginPath();
    ctx.ellipse(x*B, y*B, rx/2*B, ry/2*B, -0.3, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // === FLOOR ===
  const floorGrad = ctx.createLinearGradient(0, 90*B, 0, CH);
  floorGrad.addColorStop(0, '#2a2e3e');
  floorGrad.addColorStop(1, '#1e2230');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, 90*B, CW, CH - 90*B);

  // Floor tiles
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const tileSize = 50;
  for(let x=0;x<CW;x+=tileSize){
    ctx.beginPath(); ctx.moveTo(x, 90*B); ctx.lineTo(x, CH); ctx.stroke();
  }
  for(let y=90*B;y<CH;y+=tileSize){
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke();
  }

  // === DESKS & PEOPLE ===
  const positions = getDeskPositions();
  const agentKeys = Object.keys(STATE.agents);

  positions.forEach((pos, i) => {
    const key = DESK_AGENTS[i];
    const agent = STATE.agents[key];
    if(!agent) return;

    // Convert pixel positions to grid coords
    const gx = Math.round(pos.x/B) - 9;
    const gy = Math.round(pos.y/B);

    const isWorking = agent.status === 'working';
    const isIdle    = agent.status === 'idle';

    // Draw desk
    drawDesk(gx, gy, agent.color, isWorking, agent.icon, isWorking);

    // Draw person
    const personX = gx + 7;
    const personY = pos.row === 0 ? gy + 4 : gy + 3;
    drawPerson(personX, personY, agent.color, isWorking);

    // Typing animation particles for working agents
    if(isWorking && tick % 8 < 4){
      const rgb = hexToRgb(agent.color);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`;
      const offsetX = (tick % 3)*2 - 2;
      ctx.fillRect(Math.round((gx+5+offsetX)*B), Math.round((gy-1)*B), B, B);
    }

    // Status indicator dot below desk
    const dotColors = {working:'#22c55e',idle:'#f59e0b',done:'#22c55e',blocked:'#ef4444'};
    const dotAlpha = (agent.status==='working') ? 0.8+0.2*Math.sin(tick*0.1+i) : 0.5;
    ctx.fillStyle = dotColors[agent.status] || '#666';
    ctx.globalAlpha = dotAlpha;
    ctx.beginPath();
    ctx.arc(Math.round((gx+9)*B), Math.round((gy+14)*B), 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Agent name label
    ctx.fillStyle = 'rgba(226,232,240,0.8)';
    ctx.font = `${2*B}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(agent.name, Math.round((gx+9)*B), Math.round((gy+17)*B));
  });

  // === AMBIENT PARTICLES ===
  drawParticles();
}

// Floating light particles
const particles = [];
function initParticles(){
  for(let i=0;i<8;i++){
    particles.push({
      x: Math.random()*CW,
      y: Math.random()*CH,
      vx: (Math.random()-.5)*0.4,
      vy: (Math.random()-.5)*0.3,
      r: 1.5 + Math.random()*2,
      color: ['#6366f1','#22c55e','#06b6d4','#8b5cf6'][Math.floor(Math.random()*4)],
      alpha: 0.1 + Math.random()*0.25,
      phase: Math.random()*Math.PI*2
    });
  }
}

function drawParticles(){
  particles.forEach((p,i) => {
    p.x += p.vx;
    p.y += p.vy;
    if(p.x < 0) p.x = CW;
    if(p.x > CW) p.x = 0;
    if(p.y < 0) p.y = CH;
    if(p.y > CH) p.y = 0;
    const alpha = p.alpha * (0.6 + 0.4*Math.sin(tick*0.02 + p.phase));
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function animLoop(){
  tick++;
  drawScene();
  requestAnimationFrame(animLoop);
}

/* ============================================================
   MISSION CONTROL BAR — progress segments & clock
============================================================ */
function updateMCBar(){
  // Segments fill levels based on state
  const working = Object.values(STATE.agents).filter(a=>a.status==='working').length;
  const done    = Object.values(STATE.agents).filter(a=>a.status==='done').length;
  const total   = Object.keys(STATE.agents).length;
  const progPct = Math.round((done/total)*100);

  // Animate segments
  const fills = [100, 100, 85, 60, 40, 15];
  fills.forEach((f,i) => {
    const el = document.getElementById('seg'+(i+1));
    if(el) setTimeout(()=>{ el.style.width=f+'%'; }, 400 + i*80);
  });
}

function updateClock(){
  const n = new Date();
  const pad = v => String(v).padStart(2,'0');
  document.getElementById('mc-clock').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}

  buildPanels();
  updateMCBar();
  updateClock();
  setInterval(updateClock, 1000);
  animLoop();
}

document.addEventListener('DOMContentLoaded', init);
